name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature and why it matters.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph describing what you want to add or change.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: checkboxes
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this issue to be closed?
      options:
        - label: "Implementation complete"
        - label: "Tests added or updated"
        - label: "CI passes (ruff, ty, pytest, bjj-vqa validate)"
        - label: "README or docs updated if needed"

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Is this blocked by another issue?
      value: "Blocked by: #"
    validations:
      required: false
