name: New question submission
description: Submit a candidate question for the dataset
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new question. All seven rubric criteria will be checked before merging.

  - type: input
    id: source-url
    attributes:
      label: Source URL
      description: YouTube URL (with timestamp) for the frame.
      placeholder: "https://www.youtube.com/watch?v=EXAMPLE&t=83s"
    validations:
      required: true

  - type: dropdown
    id: license-type
    attributes:
      label: License type
      description: How is this source licensed?
      options:
        - cc_by
        - cc_by_sa
        - permissioned
        - owned
        - fair_use
    validations:
      required: true

  - type: textarea
    id: concept
    attributes:
      label: Concept being tested
      description: The teaching from the video, close to the instructor's own words.
      placeholder: "When the opponent posts their hand on the mat, switching to the omoplata creates the angle."
    validations:
      required: true

  - type: textarea
    id: frame-description
    attributes:
      label: Frame description
      description: What is visible in the still frame? Describe position, roles, and the key detail.
    validations:
      required: true

  - type: textarea
    id: draft-question
    attributes:
      label: Draft question and choices
      description: Include stem, four options (A-D), and the correct answer letter.
      placeholder: |
        **Stem**: When your opponent reacts by posting their hand, you finish by ...

        A) driving your knee into their hip
        B) switching your angle to attack the omoplata
        C) pulling their sleeve across your body
        D) flattening them with your chest pressure

        **Answer**: B

        CORRECT: B | WRONG-CONTEXT: A | WRONG-MECHANISM: C | WRONG-DIRECTION: D
    validations:
      required: true

  - type: checkboxes
    id: rubric-self-check
    attributes:
      label: Rubric self-check (T1-T7)
      description: Verify each criterion before submitting. The CI rubric will also run.
      options:
        - label: "T1 STEM_LEAK: covering the image, I cannot eliminate more than one option from stem text alone"
        - label: "T2 ROLE_COHERENCE: every option is internally consistent with the scenario in the image"
        - label: "T3 SINGLE_CORRECT: the marked answer is the only defensible answer given the image"
        - label: "T4 IMAGE_DEPENDENCY: the question cannot be answered from stem + BJJ knowledge without the image"
        - label: "T5 IMAGE_CLARITY: a BJJ practitioner can confirm from the image what the stem implies is happening"
        - label: "T6 BJJ_CORRECTNESS: the marked answer is factually correct; distractors are based on real BJJ concepts"
        - label: "T7 FORMAT_COMPLIANCE: options are similar length; correct answer is not the longest; no hedge or contrast words"
