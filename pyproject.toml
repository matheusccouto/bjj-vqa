[project]
name = "bjj-vqa"
version = "0.1.0"
description = "Brazilian Jiu-Jitsu Visual Q&A Benchmark"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-or-later"
dependencies = [
    "inspect-ai>=0.3.0",
    "huggingface-hub>=0.20.0",
    "datasets>=2.14.0",
    "pillow>=10.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
google = [
    "google-genai>=1.0.0",
]

[dependency-groups]
dev = [
    {include-group = "test"},
    {include-group = "lint"},
]
test = [
    "pytest>=8.0.0",
]
lint = [
    "ruff>=0.9.0",
]

[project.scripts]
bjj-vqa = "bjj_vqa.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"